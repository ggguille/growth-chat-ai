name: Behaviour Evaluation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - "data/knowledge-base/**"
      - "evaluation/**"
  workflow_run:
    workflows: ["Deploy Backend"]
    types: [completed]
    branches: [main]

concurrency:
  group: eval-behaviour-${{ github.ref }}
  cancel-in-progress: true

jobs:
  behaviour:
    name: DeepEval behaviour suite (phase2)
    runs-on: ubuntu-latest
    environment: evaluation

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      JUDGE_PROVIDER: "anthropic"
      JUDGE_MODEL: "claude-haiku-4-5-20251001"

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install workspace dependencies
        run: uv sync

      - name: Run Phase 2 behaviour tests
        # TODO(Phase 5): remove -m phase2 to run all 60 tests as the hard gate
        run: uv run --package evaluation pytest evaluation/behaviour -m phase2 -v
        env:
          EVAL_API_URL: ${{ vars.EVAL_API_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
