name: Behaviour Evaluation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "evaluation/**"
  workflow_run:
    workflows: ["Deploy Backend"]
    types: [completed]
    branches: [main]

concurrency:
  group: eval-behaviour-${{ github.ref }}
  cancel-in-progress: true

jobs:
  behaviour:
    name: DeepEval behaviour suite (60 tests)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: evaluation

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      JUDGE_PROVIDER: "anthropic"
      JUDGE_MODEL: "claude-haiku-4-5-20251001"

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install workspace dependencies
        run: uv sync

      - name: Warm up backend
        run: |
          uv run --package evaluation python - <<'EOF'
          import httpx, sys, time, os, uuid

          url = os.environ["EVAL_API_URL"].rstrip("/")
          api_key = os.environ.get("ZGC_API_KEY", "dev-key")

          for attempt in range(30):
              try:
                  r = httpx.get(f"{url}/ready", timeout=5.0)
                  if r.status_code == 200:
                      print(f"Backend ready (attempt {attempt + 1})")
                      break
              except Exception as exc:
                  print(f"attempt {attempt + 1}/30: {exc}")
              time.sleep(2.0)
          else:
              print("ERROR: backend did not become ready in 60 s")
              sys.exit(1)

          with httpx.stream(
              "POST", f"{url}/chat",
              json={"message": "hello"},
              headers={"ZGC-Session-ID": str(uuid.uuid4()), "ZGC-API-KEY": api_key,
                       "Accept": "text/event-stream"},
              timeout=httpx.Timeout(10.0, read=60.0),
          ) as resp:
              resp.raise_for_status()
              for line in resp.iter_lines():
                  if '"type": "done"' in line:
                      break
          print("Warm-up complete")
          EOF
        env:
          EVAL_API_URL: ${{ vars.EVAL_API_URL }}
          ZGC_API_KEY: ${{ secrets.ZGC_API_KEY }}

      - name: Run behaviour evaluation (60 tests)
        # Phase 5: full suite — 50 persona flows + 10 pattern tests + 4 edge cases.
        # Excludes test_adversarial.py (Layer 2, promptfoo gate).
        run: uv run --package evaluation pytest evaluation/behaviour -m "not adversarial" -v
        env:
          EVAL_API_URL: ${{ vars.EVAL_API_URL }}
          ZGC_API_KEY: ${{ secrets.ZGC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
