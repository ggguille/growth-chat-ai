name: Ingest Knowledge Base

on:
  push:
    branches: [main]
    paths:
      - 'data/knowledge-base/**'
      - 'data/ingestion/**'
  workflow_dispatch:

concurrency:
  group: ingest-knowledge
  cancel-in-progress: false

jobs:
  ingest:
    name: Run ingestion pipeline (OpenAI embeddings → knowledge_chunks)
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Run ingestion pipeline
        run: uv run --package ingestion --no-dev python -m ingestion.pipeline --source data/knowledge-base
        env:
          CHECKPOINT_DB_URL: ${{ secrets.CHECKPOINT_DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
