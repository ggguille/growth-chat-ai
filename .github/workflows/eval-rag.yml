name: RAG Evaluation (RAGAS)

on:
  # Primary trigger: fires automatically after a successful KB ingestion.
  # This is the correct causal chain — retrieval quality only changes when
  # the vector store content changes, which happens on ingestion.
  workflow_run:
    workflows: ["Ingest Knowledge Base"]
    types: [completed]
    branches: [main]
  # Manual trigger: for ad-hoc runs (e.g. after threshold recalibration).
  workflow_dispatch:
  # TODO(Phase 5): add pull_request trigger once continue-on-error is removed
  #   and the job is a required status check.
  #   paths: [data/knowledge-base/**, data/ingestion/src/**, evaluation/datasets/**, evaluation/rag/**]

concurrency:
  group: eval-rag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ragas:
    name: RAGAS RAG pipeline evaluation
    runs-on: ubuntu-latest
    environment: evaluation
    # Skip if triggered by a failed ingestion run — no point evaluating a broken vector store.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Enabled Phase 4 (2026-06-13). Auto-triggers after Ingest Knowledge Base on main.
    # continue-on-error remains until Phase 5 sign-off (not yet a hard gate).

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RAGAS_EMBEDDING_MODE: prod   # CI always uses the production OpenAI embeddings
      RAGAS_TOP_K: "7"             # calibrated Phase 4 — matches RAG_TOP_K in production
      ANTHROPIC_MODEL_NAME: claude-haiku-4-5-20251001

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install workspace dependencies (with RAGAS extra)
        # The ragas extra installs scikit-network which requires a C compiler.
        # Linux CI has gcc/g++ available so the source build succeeds here.
        # On Windows, install VS Build Tools first or run RAGAS in CI only.
        run: uv sync --extra ragas

      - name: Run RAGAS evaluation
        # Exit code 1 if any metric falls below its threshold — see runner.py THRESHOLDS.
        # A RAGAS failure does NOT block the deploy automatically; it requires explicit
        # documented review before the next Phase 4 approval (see action plan §Phase 4).
        # TODO(Phase 5): make this a hard gate by adding `continue-on-error: false`
        # and wiring it as a required status check on the main branch.
        continue-on-error: true
        run: >
          uv run --package evaluation python -m evaluation.rag.runner
          --embedding-mode prod
        env:
          RAGAS_DB_URL: ${{ secrets.RAGAS_DB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
